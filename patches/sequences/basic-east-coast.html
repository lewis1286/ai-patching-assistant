<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic East Coast Patch — Eurorack Patcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    /* ── Header ── */
    .patch-header {
      background: #1a1a1a;
      color: #fff;
      padding: 18px 24px 14px;
    }
    .patch-header h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: -0.01em; }
    .patch-meta {
      display: flex; gap: 16px; margin-top: 6px; flex-wrap: wrap;
      font-size: 0.78rem; color: #aaa;
    }
    .patch-meta span { display: flex; align-items: center; gap: 5px; }
    .badge {
      display: inline-block; padding: 1px 7px; border-radius: 10px;
      font-size: 0.72rem; font-weight: 600; background: #333; color: #ccc;
    }

    /* ── Controls ── */
    .controls {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 24px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .controls-label { font-size: 0.75rem; color: #888; font-weight: 500; margin-right: 4px; }
    .type-btn {
      border: 1.5px solid currentColor;
      background: transparent;
      border-radius: 14px;
      padding: 3px 11px;
      font-size: 0.75rem; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    .type-btn[data-type="audio"]  { color: #E24A33; }
    .type-btn[data-type="cv"]     { color: #348ABD; }
    .type-btn[data-type="gate"]   { color: #52A35F; }
    .type-btn[data-type="clock"]  { color: #E5AE38; }
    .type-btn[data-type="pitch"]  { color: #9B59B6; }
    .type-btn.active { color: #fff; }
    .type-btn.active[data-type="audio"]  { background: #E24A33; border-color: #E24A33; }
    .type-btn.active[data-type="cv"]     { background: #348ABD; border-color: #348ABD; }
    .type-btn.active[data-type="gate"]   { background: #52A35F; border-color: #52A35F; }
    .type-btn.active[data-type="clock"]  { background: #E5AE38; border-color: #E5AE38; }
    .type-btn.active[data-type="pitch"]  { background: #9B59B6; border-color: #9B59B6; }
    .divider { width: 1px; height: 22px; background: #ddd; margin: 0 4px; }
    .anim-btn {
      border: 1.5px solid #bbb; background: transparent; border-radius: 14px;
      padding: 3px 11px; font-size: 0.75rem; font-weight: 500; cursor: pointer;
      color: #666; transition: background 0.15s, color 0.15s;
    }
    .anim-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }

    /* ── Diagram area ── */
    .diagram-wrapper {
      position: relative;
      background: #fff;
      overflow-x: auto;
      padding: 20px 24px;
    }
    #patch-svg {
      display: block;
      max-width: 100%;
    }

    /* ── SVG cable styles ── */
    .cable {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      transition: opacity 0.2s, stroke-width 0.15s;
      cursor: pointer;
    }
    .cable[data-type="audio"]  { stroke: #E24A33; }
    .cable[data-type="cv"]     { stroke: #348ABD; }
    .cable[data-type="gate"]   { stroke: #52A35F; }
    .cable[data-type="clock"]  { stroke: #E5AE38; }
    .cable[data-type="pitch"]  { stroke: #9B59B6; }
    .cable.dimmed  { opacity: 0.15; }
    .cable.hovered { stroke-width: 4; opacity: 1 !important; }

    /* Animation: moving dashes along cable */
    .cable.animate[data-type="audio"]  {
      stroke-dasharray: 8 6;
      animation: flow-fast 0.5s linear infinite;
    }
    .cable.animate[data-type="cv"]     {
      stroke-dasharray: 10 8;
      animation: flow-med 1.2s linear infinite;
    }
    .cable.animate[data-type="gate"]   {
      stroke-dasharray: 4 12;
      animation: flow-slow 1.8s linear infinite;
    }
    .cable.animate[data-type="clock"]  {
      stroke-dasharray: 6 6;
      animation: flow-clock 0.8s linear infinite;
    }
    .cable.animate[data-type="pitch"]  {
      stroke-dasharray: 12 4;
      animation: flow-med 1.4s linear infinite;
    }
    @keyframes flow-fast  { to { stroke-dashoffset: -28; } }
    @keyframes flow-med   { to { stroke-dashoffset: -36; } }
    @keyframes flow-slow  { to { stroke-dashoffset: -32; } }
    @keyframes flow-clock { to { stroke-dashoffset: -24; } }

    /* ── Module icon hover ── */
    .module-group { cursor: pointer; }
    .module-group:hover .module-bg { fill: #f0f7ff; }
    .module-group.selected .module-bg { fill: #e8f0fe; stroke: #4a80e0; stroke-width: 1.5px; }
    .module-bg {
      fill: transparent;
      rx: 6; ry: 6;
      transition: fill 0.15s;
    }
    .module-label {
      font-size: 9px;
      text-anchor: middle;
      fill: #444;
      pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* ── Tooltip ── */
    #cable-tooltip {
      position: fixed;
      background: #1a1a1a;
      color: #fff;
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 0.78rem;
      line-height: 1.5;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.12s;
      max-width: 260px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    #cable-tooltip.visible { opacity: 1; }
    #cable-tooltip .tt-type {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; margin-bottom: 3px;
    }
    #cable-tooltip .tt-route { font-weight: 600; }
    #cable-tooltip .tt-note  { color: #aaa; font-size: 0.73rem; margin-top: 2px; }

    /* ── Module detail panel ── */
    #module-panel {
      position: fixed;
      top: 0; right: 0;
      width: 300px; height: 100vh;
      background: #fff;
      border-left: 1px solid #e0e0e0;
      box-shadow: -4px 0 20px rgba(0,0,0,0.1);
      z-index: 200;
      transform: translateX(100%);
      transition: transform 0.22s ease;
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    #module-panel.open { transform: translateX(0); }
    .panel-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid #e8e8e8;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .panel-header h2 { font-size: 1rem; font-weight: 600; }
    .panel-mfr { font-size: 0.75rem; color: #888; margin-top: 2px; }
    .panel-close {
      background: none; border: none; cursor: pointer; color: #888;
      font-size: 1.2rem; line-height: 1; padding: 2px 4px;
    }
    .panel-close:hover { color: #333; }
    .panel-body { padding: 14px 18px; }
    .panel-section-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: #999; margin: 14px 0 6px;
    }
    .panel-setting {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 4px 0; border-bottom: 1px solid #f2f2f2; font-size: 0.83rem;
    }
    .panel-setting .key { color: #555; }
    .panel-setting .val { color: #222; font-weight: 500; text-align: right; max-width: 55%; }
    .panel-cables { margin-top: 8px; }
    .panel-cable-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; font-size: 0.78rem; border-bottom: 1px solid #f2f2f2;
    }
    .cable-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }

    /* ── Main content below diagram ── */
    .patch-content { padding: 24px; max-width: 900px; }

    details { margin-bottom: 16px; }
    summary {
      cursor: pointer; font-size: 0.85rem; font-weight: 600;
      color: #333; padding: 10px 14px;
      background: #fff; border: 1px solid #e0e0e0; border-radius: 6px;
      list-style: none; display: flex; justify-content: space-between;
    }
    summary::-webkit-details-marker { display: none; }
    summary::after { content: "▸"; color: #aaa; }
    details[open] summary { border-radius: 6px 6px 0 0; }
    details[open] summary::after { content: "▾"; }
    .details-body {
      border: 1px solid #e0e0e0; border-top: none;
      border-radius: 0 0 6px 6px; background: #fff;
      padding: 14px;
    }
    .tips-list { list-style: none; }
    .tips-list li {
      padding: 7px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem;
      line-height: 1.55; color: #444;
    }
    .tips-list li:last-child { border-bottom: none; }
    .tips-list li::before { content: "→ "; color: #aaa; }

    /* ── Cable table ── */
    .cable-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .cable-table th {
      text-align: left; font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: #888; border-bottom: 2px solid #e0e0e0;
      padding: 6px 8px;
    }
    .cable-table td { padding: 5px 8px; border-bottom: 1px solid #f0f0f0; color: #333; }
    .cable-table tr:hover td { background: #fafafa; }
    .cable-table .cable-num { color: #bbb; font-weight: 600; }
    .sig-chip {
      display: inline-block; padding: 1px 6px; border-radius: 8px;
      font-size: 0.68rem; font-weight: 700; color: #fff;
    }
    .sig-chip.audio  { background: #E24A33; }
    .sig-chip.cv     { background: #348ABD; }
    .sig-chip.gate   { background: #52A35F; }
    .sig-chip.clock  { background: #E5AE38; color: #333; }
    .sig-chip.pitch  { background: #9B59B6; }
    .cable-section-head td {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: #aaa; padding-top: 12px; padding-bottom: 2px;
      background: none !important;
    }

    /* ── Footer ── */
    .patch-footer {
      padding: 16px 24px;
      font-size: 0.72rem; color: #999; border-top: 1px solid #e0e0e0;
      line-height: 1.6;
    }
  </style>
</head>

</div>

<!-- ═══════════════════════════════════════════════════════════

      <div class="panel-mfr" id="panel-mfr"></div>

    <button class="panel-close" id="panel-close">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     PATCH CONTENT
═══════════════════════════════════════════════════════════ -->
<div class="patch-content">
  <details>
    <summary>Performance Tips</summary>
    <div class="details-body">
      <ul class="tips-list" id="tips-list"></ul>
    </div>
  </details>
  <details>
    <summary>Full Cable Table</summary>
    <div class="details-body">
      <table class="cable-table" id="cable-table">
        <thead>
          <tr>
            <th>#</th><th>From</th><th>Jack</th><th>To</th><th>Jack</th><th>Type</th><th>Notes</th>
          </tr>
        </thead>
        <tbody id="cable-tbody"></tbody>
      </table>
    </div>
  </details>
</div>

// ─────────────────────────────────────────────────────────────
// RENDERING ENGINE — do not edit below this line
// ─────────────────────────────────────────────────────────────

const COLOR = { audio:"#E24A33", cv:"#348ABD", gate:"#52A35F", clock:"#E5AE38", pitch:"#9B59B6" };
const LABEL = { audio:"Audio", cv:"CV/Mod", gate:"Gate", clock:"Clock", pitch:"V/Oct" };
const ICON  = 60; // rendered icon size in px
const HALF  = ICON / 2;

const svg       = document.getElementById("patch-svg");
const defs      = document.getElementById("symbol-defs");
const cablesL   = document.getElementById("cables-layer");
const modulesL  = document.getElementById("modules-layer");
const legendL   = document.getElementById("legend-layer");
const tooltip   = document.getElementById("cable-tooltip");
const panel     = document.getElementById("module-panel");

// State
let hiddenTypes = new Set();
let animating   = false;
let selectedMod = null;

// ── Header metadata ──────────────────────────────────────────
document.getElementById("patch-title").textContent      = PATCH.title;
document.getElementById("patch-category").textContent   = PATCH.category;
document.getElementById("patch-complexity").textContent = PATCH.complexity;
document.getElementById("patch-voices").textContent     = PATCH.voices;
document.getElementById("patch-date").textContent       = PATCH.date;
svg.setAttribute("viewBox", PATCH.viewBox);

// ── Inject symbols ───────────────────────────────────────────
PATCH.symbols.forEach(sym => {
  const el = document.createElementNS("http://www.w3.org/2000/svg","symbol");
  el.setAttribute("id",      "sym-" + sym.id);
  el.setAttribute("viewBox", sym.viewBox);
  el.innerHTML = sym.content;
  defs.appendChild(el);
});

// ── Arrowhead markers ─────────────────────────────────────────
Object.entries(COLOR).forEach(([type, color]) => {
  const marker = document.createElementNS("http://www.w3.org/2000/svg","marker");
  marker.setAttribute("id",          "arrow-" + type);
  marker.setAttribute("markerWidth", "8");
  marker.setAttribute("markerHeight","6");
  marker.setAttribute("refX",        "7");
  marker.setAttribute("refY",        "3");
  marker.setAttribute("orient",      "auto");
  marker.innerHTML = `<path d="M0,0 L0,6 L8,3 z" fill="${color}"/>`;
  defs.appendChild(marker);
});

// ── Draw cables ──────────────────────────────────────────────
PATCH.cables.forEach(cable => {
  const path = document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d",             cable.d);
  path.setAttribute("data-cable-id", cable.id);
  path.setAttribute("data-type",     cable.type);
  path.classList.add("cable");
  path.style.markerEnd = `url(#arrow-${cable.type})`;
  cablesL.appendChild(path);

  // hit-test overlay (wider invisible path for easier hovering)
  const hit = document.createElementNS("http://www.w3.org/2000/svg","path");
  hit.setAttribute("d",         cable.d);
  hit.setAttribute("fill",      "none");
  hit.setAttribute("stroke",    "transparent");
  hit.setAttribute("stroke-width","12");
  hit.style.cursor = "pointer";
  hit.addEventListener("mouseenter", e => showTooltip(cable, e));
  hit.addEventListener("mousemove",  e => moveTooltip(e));
  hit.addEventListener("mouseleave", hideTooltip);
  cablesL.appendChild(hit);
});

// ── Draw modules ─────────────────────────────────────────────
PATCH.modules.forEach(mod => {
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("data-module-id", mod.id);
  g.classList.add("module-group");

  // hover background rect
  const bg = document.createElementNS("http://www.w3.org/2000/svg","rect");
  bg.setAttribute("x",      mod.x - HALF - 4);
  bg.setAttribute("y",      mod.y - HALF - 4);
  bg.setAttribute("width",  ICON + 8);
  bg.setAttribute("height", ICON + 8);
  bg.setAttribute("rx",     6);
  bg.classList.add("module-bg");
  g.appendChild(bg);

  // symbol <use>
  const use = document.createElementNS("http://www.w3.org/2000/svg","use");
  use.setAttribute("href",   "#sym-" + mod.symbol);
  use.setAttribute("x",      mod.x - HALF);
  use.setAttribute("y",      mod.y - HALF);
  use.setAttribute("width",  ICON);
  use.setAttribute("height", ICON);
  g.appendChild(use);

  // label
  const text = document.createElementNS("http://www.w3.org/2000/svg","text");
  text.setAttribute("x", mod.x);
  text.setAttribute("y", mod.y + HALF + 13);
  text.classList.add("module-label");
  text.textContent = mod.name;
  g.appendChild(text);

  g.addEventListener("click", () => openPanel(mod));
  modulesL.appendChild(g);
});

// ── Draw legend ──────────────────────────────────────────────
(function drawLegend() {
  const vb   = PATCH.viewBox.split(" ").map(Number);
  const lx   = vb[0] + 20;
  const ly   = vb[3] - 48;
  const bg   = document.createElementNS("http://www.w3.org/2000/svg","rect");
  bg.setAttribute("x",      lx - 6);
  bg.setAttribute("y",      ly - 14);
  bg.setAttribute("width",  360);
  bg.setAttribute("height", 36);
  bg.setAttribute("rx",     6);
  bg.setAttribute("fill",   "#f5f5f5");
  bg.setAttribute("stroke", "#ddd");
  bg.setAttribute("stroke-width","1");
  legendL.appendChild(bg);

  let ix = lx;
  Object.entries(COLOR).forEach(([type, color]) => {
    const line = document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1", ix);      line.setAttribute("y1", ly);
    line.setAttribute("x2", ix + 22); line.setAttribute("y2", ly);
    line.setAttribute("stroke",       color);
    line.setAttribute("stroke-width", "2.5");
    legendL.appendChild(line);

    const txt = document.createElementNS("http://www.w3.org/2000/svg","text");
    txt.setAttribute("x",           ix + 26);
    txt.setAttribute("y",           ly + 4);
    txt.setAttribute("font-size",   "9");
    txt.setAttribute("fill",        "#444");
    txt.setAttribute("font-family", "Arial,sans-serif");
    txt.textContent = LABEL[type];
    legendL.appendChild(txt);

    ix += 26 + txt.textContent.length * 6 + 14;
  });
})();

// ── Cable table ───────────────────────────────────────────────
const tbody = document.getElementById("cable-tbody");
const groups = {};
PATCH.cables.forEach(c => {
  (groups[c.type] = groups[c.type] || []).push(c);
});
Object.entries(groups).forEach(([type, cables]) => {
  const hdr = document.createElement("tr");
  hdr.classList.add("cable-section-head");
  hdr.innerHTML = `<td colspan="7">${LABEL[type]}</td>`;
  tbody.appendChild(hdr);
  cables.forEach(c => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="cable-num">${c.num}</td>
      <td>${c.from}</td><td>${c.fromJack}</td>
      <td>${c.to}</td><td>${c.toJack}</td>
      <td><span class="sig-chip ${type}">${LABEL[type]}</span></td>
      <td>${c.label}</td>`;
    tbody.appendChild(tr);
  });
});

// ── Tips ─────────────────────────────────────────────────────
const tipsList = document.getElementById("tips-list");
PATCH.tips.forEach(tip => {
  const li = document.createElement("li");
  li.textContent = tip;
  tipsList.appendChild(li);
});

// ─────────────────────────────────────────────────────────────
// INTERACTIVITY
// ─────────────────────────────────────────────────────────────

// Signal type filter buttons
document.querySelectorAll(".type-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const type = btn.dataset.type;
    if (hiddenTypes.has(type)) {
      hiddenTypes.delete(type);
      btn.classList.add("active");
    } else {
      hiddenTypes.add(type);
      btn.classList.remove("active");
    }
    updateCableVisibility();
  });
});

function updateCableVisibility() {
  document.querySelectorAll(".cable").forEach(path => {
    const type = path.dataset.type;
    if (hiddenTypes.has(type)) {
      path.classList.add("dimmed");
    } else {
      path.classList.remove("dimmed");
    }
  });
}

// Animation toggle
document.getElementById("anim-toggle").addEventListener("click", function() {
  animating = !animating;
  this.classList.toggle("active", animating);
  this.textContent = animating ? "⏸ Animate" : "▶ Animate";
  document.querySelectorAll(".cable").forEach(p => p.classList.toggle("animate", animating));
});

// Tooltip
function showTooltip(cable, e) {
  const visPath = cablesL.querySelector(`[data-cable-id="${cable.id}"]`);
  if (visPath) visPath.classList.add("hovered");
  document.getElementById("tt-type").textContent  = LABEL[cable.type];
  document.getElementById("tt-type").style.color  = COLOR[cable.type];
  document.getElementById("tt-route").textContent = `${cable.from} → ${cable.to}`;
  document.getElementById("tt-note").textContent  = cable.label;
  tooltip.classList.add("visible");
  moveTooltip(e);
}
function moveTooltip(e) {
  const tx = Math.min(e.clientX + 14, window.innerWidth  - 280);
  const ty = Math.min(e.clientY + 14, window.innerHeight - 100);
  tooltip.style.left = tx + "px";
  tooltip.style.top  = ty + "px";
}
function hideTooltip() {
  tooltip.classList.remove("visible");
  document.querySelectorAll(".cable.hovered").forEach(p => p.classList.remove("hovered"));
}

// Module panel
function openPanel(mod) {
  if (selectedMod === mod.id) { closePanel(); return; }
  selectedMod = mod.id;
  document.querySelectorAll(".module-group").forEach(g => g.classList.remove("selected"));
  const g = document.querySelector(`[data-module-id="${mod.id}"]`);
  if (g) g.classList.add("selected");

  document.getElementById("panel-name").textContent = mod.name;
  document.getElementById("panel-mfr").textContent  = mod.mfr;

  const body = document.getElementById("panel-body");
  body.innerHTML = "";

  // Settings
  const sh = document.createElement("div");
  sh.className = "panel-section-title"; sh.textContent = "Settings (this patch)";
  body.appendChild(sh);
  mod.settings.forEach(s => {
    const row = document.createElement("div");
    row.className = "panel-setting";
    row.innerHTML = `<span class="key">${s.key}</span><span class="val">${s.val}</span>`;
    body.appendChild(row);
  });

  // Connected cables
  const connected = PATCH.cables.filter(c => c.from === mod.id || c.to === mod.id);
  if (connected.length) {
    const ch = document.createElement("div");
    ch.className = "panel-section-title"; ch.textContent = "Connections";
    body.appendChild(ch);
    const cbox = document.createElement("div"); cbox.className = "panel-cables";
    connected.forEach(c => {
      const row = document.createElement("div"); row.className = "panel-cable-row";
      const isOut = c.from === mod.id;
      row.innerHTML = `
        <div class="cable-dot" style="background:${COLOR[c.type]}"></div>
        <div>
          <strong>${isOut ? "→" : "←"} ${isOut ? c.to : c.from}</strong><br>
          <span style="font-size:0.73rem;color:#777">${isOut ? c.fromJack : c.toJack} · ${LABEL[c.type]}</span>
        </div>`;
      cbox.appendChild(row);
    });
    body.appendChild(cbox);
  }

  panel.classList.add("open");
}

function closePanel() {
  selectedMod = null;
  panel.classList.remove("open");
  document.querySelectorAll(".module-group").forEach(g => g.classList.remove("selected"));
}

document.getElementById("panel-close").addEventListener("click", closePanel);
document.addEventListener("click", e => {
  if (selectedMod && !panel.contains(e.target) && !e.target.closest(".module-group")) closePanel();
});
</script>
